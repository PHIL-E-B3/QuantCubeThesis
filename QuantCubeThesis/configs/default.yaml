# ============================================================
# FOMC Sentiment Pipeline — Default Configuration
# ============================================================

# --- Model ---
model:
  name: "meta-llama/Meta-Llama-3.1-8B-Instruct"  # Llama 3.1
  max_seq_length: 256          # Keep this exactly as we calculated!
  trust_remote_code: false

# --- Quantization (QLoRA) ---
quantization:
  load_in_4bit: true
  bnb_4bit_quant_type: "nf4"   
  bnb_4bit_compute_dtype: "bfloat16"
  bnb_4bit_use_double_quant: true

# --- LoRA ---
lora:
  r: 8                          # Rank — Optuna will search {4, 8, 16, 32}
  lora_alpha: 16                # Scaling factor — typically 2*r
  lora_dropout: 0.1
  bias: "none"
  task_type: "SEQ_CLS"          # Sequence classification
  target_modules:               # All linear layers per Dettmers et al.
    - "q_proj"
    - "k_proj"
    - "v_proj"
    - "o_proj"
    - "gate_proj"
    - "up_proj"
    - "down_proj"

# --- Classification Labels ---
# Each key matches the abbreviated field name used in the sentence JSON files.
labels:
  top: ["inflation", "unemployment", "economic_activity", "macro", "financial_conditions", "monetary_policy", "no_topic", "boilerplate"]
  sen: [-2, -1, 0, 1, 2, "na"]   # numeric; "na" only for boilerplate
  ten: ["descriptive", "interpretive"]   # descriptive = backward/present; interpretive = forward
  hor: [true, false]                     # true = long_term horizon present; false otherwise
  com: ["none", "conditional", "unconditional"]
  ris: ["na", "skewed_downside", "symmetric", "skewed_upside"]
  wid: ["none", "contested", "elevated"]
# Which label field to use as the primary classification target
# (used by active_learn.py for uncertainty sampling)
primary_label: "sen"

# --- Training ---
training:
  num_epochs: 5
  per_device_train_batch_size: 8   # Safe for 16GB VRAM with QLoRA
  per_device_eval_batch_size: 16
  gradient_accumulation_steps: 2   # Effective batch size = 16
  learning_rate: 2.0e-4
  weight_decay: 0.01
  warmup_ratio: 0.1
  lr_scheduler_type: "cosine"
  logging_steps: 10
  eval_strategy: "epoch"
  save_strategy: "epoch"
  load_best_model_at_end: true
  metric_for_best_model: "f1_macro"
  fp16: false
  bf16: true                     # RTX 4070 Ti Super supports bf16

# --- Optuna Hyperparameter Search ---
optuna:
  n_trials: 50
  sampler: TPE               # default, but explicit is good
  pruner: 
    type: MedianPruner       # kills bad trials early — critical on your GPU
    n_startup_trials: 10     # random exploration before pruning kicks in
    n_warmup_steps: 50       # steps before a trial can be pruned

  search_space:
    lora_r: [2, 4, 8]
    lora_alpha_multiplier: [1, 2]       # alpha = r * multiplier
    lora_dropout: [0.05, 0.1, 0.2]     # dropped 0.0 — literature supports regularization
    learning_rate:
      low: 1.0e-4
      high: 5.0e-4
      log: true
    per_device_train_batch_size: [4, 8] # dropped 16 — OOM risk on 16GB with Mistral 7B
    weight_decay: [0.01, 0.05, 0.1]    # AdamW weight decay — second regularization axis

# --- Active Learning ---
active_learning:
  seed_size: 300                   # Initial hand-labelled set
  query_size: 80                   # Sentences to label per cycle
  max_cycles: 4
  strategy: "entropy"              # Options: entropy, margin, least_confidence
  holdout_crisis_episodes: true    # Separate validation for GFC/COVID sentences

# --- Paths ---
paths:
  data_raw: "data/raw"
  data_labels: "data/labels"
  data_processed: "data/processed"
  unlabelled_pool: "data/all_unlabelled_sentences/master_unlabelled_pool.json"
  seed_sentences: "data/initial_training_seed_sentences"
  model_output: "models"
  logs: "logs"
