# ============================================================
# FOMC Sentiment Pipeline — Default Configuration
# ============================================================

# --- Model ---
model:
  name: "unsloth/Meta-Llama-3.1-8B-Instruct"  # Llama 3.1 (ungated mirror)
  max_seq_length: 1280         # Prompt (~900 tokens) + JSON response (~80 tokens)
  trust_remote_code: false

# --- Quantization (QLoRA) ---
quantization:
  load_in_4bit: true
  bnb_4bit_quant_type: "nf4"   
  bnb_4bit_compute_dtype: "bfloat16"
  bnb_4bit_use_double_quant: true

# --- LoRA ---
lora:
  r: 4                          # Rank — Optuna will search {2, 4, 8}; r=4 is informed prior (FinLoRA)
  lora_alpha: 8                 # Scaling factor = m*r; m=2 empirically optimal
  lora_dropout: 0.1
  bias: "none"
  task_type: "CAUSAL_LM"        # Generative JSON output
  target_modules:               # All linear layers per Dettmers et al.
    - "q_proj"
    - "k_proj"
    - "v_proj"
    - "o_proj"
    - "gate_proj"
    - "up_proj"
    - "down_proj"

# --- Classification Labels ---
# Each key matches the abbreviated field name used in the sentence JSON files.
labels:
  top: ["inflation", "labor_market", "economic_activity", "macro", "financial_conditions", "monetary_policy", "no_topic", "boilerplate"]
  sen: ["strongly_dovish", "dovish", "neutral", "hawkish", "strongly_hawkish", "na"]   # "na" only for boilerplate
  ten: ["descriptive", "interpretive"]   # descriptive = backward/present; interpretive = forward
  hor: [true, false]                     # true = long_term horizon present; false otherwise
  com: ["none", "conditional", "unconditional"]
  ris: ["na", "skewed_downside", "symmetric", "skewed_upside"]
  wid: ["none", "contested", "elevated"]
# Which label field to use as the primary classification target
# (used by active_learn.py for uncertainty sampling)
primary_label: "sen"

# --- Training ---
training:
  num_epochs: 3
  per_device_train_batch_size: 8   # Safe for 16GB VRAM with QLoRA
  per_device_eval_batch_size: 16
  gradient_accumulation_steps: 2   # Effective batch size = 16
  learning_rate: 2.0e-4
  weight_decay: 0.01
  warmup_ratio: 0.1
  lr_scheduler_type: "cosine"
  logging_steps: 10
  eval_strategy: "epoch"
  save_strategy: "epoch"
  load_best_model_at_end: true
  metric_for_best_model: "f1_macro"
  fp16: false
  bf16: true                     # RTX 4070 Ti Super supports bf16; more stable than fp16
  optim: "paged_adamw_8bit"      # QLoRA standard; manages memory spikes during checkpointing
  dataloader_num_workers: 0      # 0 = main process only (safest on Windows; set to 2 on Linux)
  group_by_length: true          # sort by length before batching — reduces padding waste

# --- Optuna Hyperparameter Search ---
optuna:
  n_trials: 25                # 25 trials is sufficient for 632 samples; 50 wastes hours on this GPU
  sampler: TPE               # default, but explicit is good
  pruner:
    type: MedianPruner
    n_startup_trials: 5      # start pruning after 5 random trials
    n_warmup_epochs: 1       # don't prune before epoch 1 completes

  search_space:
    lora_r: [2, 4, 8]
    lora_alpha_multiplier: [1, 2]
    lora_dropout: [0.05, 0.1, 0.2]
    learning_rate:
      low: 1.0e-4
      high: 5.0e-4
      log: true
    weight_decay: [0.01, 0.05, 0.1]
    per_device_train_batch_size: [4, 8]  # 16 risks OOM with Llama 8B on 16GB

# --- Active Learning ---
active_learning:
  seed_size: 300                   # Initial hand-labelled set
  query_size: 80                   # Sentences to label per cycle
  max_cycles: 4
  strategy: "entropy"              # Options: entropy, margin, least_confidence
  holdout_crisis_episodes: true    # Separate validation for GFC/COVID sentences

# --- Paths ---
paths:
  data_raw: "data/raw"
  data_labels: "data/labels"
  data_processed: "data/processed"
  unlabelled_pool: "data/all_unlabelled_sentences/master_unlabelled_pool.json"
  seed_sentences: "data/initial_training_seed_sentences"
  seed_data_merged: "data/QuantCube_Seed_Labelled/all_labelled_sentences.json"
  model_output: "models"
  logs: "logs"
